<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <title>Domek — Bukett</title>
  <desc>Tileable 70s rose-bouquet pattern from the kitchen wallpaper. Dense coverage matching original. 240×240 tile.</desc>

  <!-- Background — warm cream, sampled from original -->
  <rect width="240" height="240" fill="#E8DDC0"/>

  <defs>
    <!-- ROSE A — bright butterscotch (most luminous) -->
    <g id="rose-A">
      <g fill="#8E5118">
        <ellipse rx="8.6" ry="12.2" cy="-9.4"/>
        <ellipse rx="8.6" ry="12.2" cy="-9.4" transform="rotate(60)"/>
        <ellipse rx="8.6" ry="12.2" cy="-9.4" transform="rotate(120)"/>
        <ellipse rx="8.6" ry="12.2" cy="-9.4" transform="rotate(180)"/>
        <ellipse rx="8.6" ry="12.2" cy="-9.4" transform="rotate(240)"/>
        <ellipse rx="8.6" ry="12.2" cy="-9.4" transform="rotate(300)"/>
      </g>
      <g fill="#C77A2C" transform="rotate(30)">
        <ellipse rx="6.4" ry="9.2" cy="-7.2"/>
        <ellipse rx="6.4" ry="9.2" cy="-7.2" transform="rotate(60)"/>
        <ellipse rx="6.4" ry="9.2" cy="-7.2" transform="rotate(120)"/>
        <ellipse rx="6.4" ry="9.2" cy="-7.2" transform="rotate(180)"/>
        <ellipse rx="6.4" ry="9.2" cy="-7.2" transform="rotate(240)"/>
        <ellipse rx="6.4" ry="9.2" cy="-7.2" transform="rotate(300)"/>
      </g>
      <g fill="#E89A40">
        <ellipse rx="4.4" ry="6" cy="-4.6"/>
        <ellipse rx="4.4" ry="6" cy="-4.6" transform="rotate(72)"/>
        <ellipse rx="4.4" ry="6" cy="-4.6" transform="rotate(144)"/>
        <ellipse rx="4.4" ry="6" cy="-4.6" transform="rotate(216)"/>
        <ellipse rx="4.4" ry="6" cy="-4.6" transform="rotate(288)"/>
      </g>
      <circle r="2.6" fill="#F5C260"/>
      <circle r="1" fill="#3D2812"/>
    </g>

    <!-- ROSE B — deep amber (richer outer) -->
    <g id="rose-B">
      <g fill="#6B3D10">
        <ellipse rx="8.8" ry="12.6" cy="-9.6"/>
        <ellipse rx="8.8" ry="12.6" cy="-9.6" transform="rotate(60)"/>
        <ellipse rx="8.8" ry="12.6" cy="-9.6" transform="rotate(120)"/>
        <ellipse rx="8.8" ry="12.6" cy="-9.6" transform="rotate(180)"/>
        <ellipse rx="8.8" ry="12.6" cy="-9.6" transform="rotate(240)"/>
        <ellipse rx="8.8" ry="12.6" cy="-9.6" transform="rotate(300)"/>
      </g>
      <g fill="#A85F1C" transform="rotate(30)">
        <ellipse rx="6.6" ry="9.4" cy="-7.4"/>
        <ellipse rx="6.6" ry="9.4" cy="-7.4" transform="rotate(60)"/>
        <ellipse rx="6.6" ry="9.4" cy="-7.4" transform="rotate(120)"/>
        <ellipse rx="6.6" ry="9.4" cy="-7.4" transform="rotate(180)"/>
        <ellipse rx="6.6" ry="9.4" cy="-7.4" transform="rotate(240)"/>
        <ellipse rx="6.6" ry="9.4" cy="-7.4" transform="rotate(300)"/>
      </g>
      <g fill="#D68842">
        <ellipse rx="4.6" ry="6.2" cy="-4.8"/>
        <ellipse rx="4.6" ry="6.2" cy="-4.8" transform="rotate(72)"/>
        <ellipse rx="4.6" ry="6.2" cy="-4.8" transform="rotate(144)"/>
        <ellipse rx="4.6" ry="6.2" cy="-4.8" transform="rotate(216)"/>
        <ellipse rx="4.6" ry="6.2" cy="-4.8" transform="rotate(288)"/>
      </g>
      <circle r="2.6" fill="#E89A40"/>
      <circle r="1" fill="#2D1A08"/>
    </g>

    <!-- ROSE C — pale buttercup (lightest accent) -->
    <g id="rose-C">
      <g fill="#A85F1C">
        <ellipse rx="7.6" ry="10.8" cy="-8"/>
        <ellipse rx="7.6" ry="10.8" cy="-8" transform="rotate(60)"/>
        <ellipse rx="7.6" ry="10.8" cy="-8" transform="rotate(120)"/>
        <ellipse rx="7.6" ry="10.8" cy="-8" transform="rotate(180)"/>
        <ellipse rx="7.6" ry="10.8" cy="-8" transform="rotate(240)"/>
        <ellipse rx="7.6" ry="10.8" cy="-8" transform="rotate(300)"/>
      </g>
      <g fill="#E89A40" transform="rotate(30)">
        <ellipse rx="5.4" ry="8" cy="-6.2"/>
        <ellipse rx="5.4" ry="8" cy="-6.2" transform="rotate(60)"/>
        <ellipse rx="5.4" ry="8" cy="-6.2" transform="rotate(120)"/>
        <ellipse rx="5.4" ry="8" cy="-6.2" transform="rotate(180)"/>
        <ellipse rx="5.4" ry="8" cy="-6.2" transform="rotate(240)"/>
        <ellipse rx="5.4" ry="8" cy="-6.2" transform="rotate(300)"/>
      </g>
      <g fill="#F5C260">
        <ellipse rx="4.6" ry="6.2" cy="-4.8"/>
        <ellipse rx="3.8" ry="5.2" cy="-4" transform="rotate(72)"/>
        <ellipse rx="3.8" ry="5.2" cy="-4" transform="rotate(144)"/>
        <ellipse rx="3.8" ry="5.2" cy="-4" transform="rotate(216)"/>
        <ellipse rx="3.8" ry="5.2" cy="-4" transform="rotate(288)"/>
      </g>
      <circle r="2.4" fill="#FCDC8C"/>
      <circle r="0.9" fill="#5C3A14"/>
    </g>

    <!-- LEAVES — warm olive matching original -->
    <g id="leaf-L">
      <path d="M 0,-15 C 6,-11 6,11 0,15 C -6,11 -6,-11 0,-15 Z" fill="#54482A"/>
      <path d="M 0,-13 L 0,13" stroke="#2E2410" stroke-width="0.7" opacity="0.85" fill="none"/>
    </g>
    <g id="leaf-M">
      <path d="M 0,-12 C 5,-9 5,9 0,12 C -5,9 -5,-9 0,-12 Z" fill="#6E5E2E"/>
      <path d="M 0,-10 L 0,10" stroke="#2E2410" stroke-width="0.55" opacity="0.8" fill="none"/>
    </g>
    <g id="leaf-S">
      <path d="M 0,-7.5 C 3,-5 3,5 0,7.5 C -3,5 -3,-5 0,-7.5 Z" fill="#7E6E36"/>
    </g>
    <g id="leaf-XS">
      <path d="M 0,-5 C 2,-3.4 2,3.4 0,5 C -2,3.4 -2,-3.4 0,-5 Z" fill="#6E5E2E"/>
    </g>

    <!-- Cream daisy 5-petal -->
    <g id="daisy-s">
      <g fill="#F0E8D5">
        <ellipse rx="1.8" ry="4.2" cy="-3.4"/>
        <ellipse rx="1.8" ry="4.2" cy="-3.4" transform="rotate(72)"/>
        <ellipse rx="1.8" ry="4.2" cy="-3.4" transform="rotate(144)"/>
        <ellipse rx="1.8" ry="4.2" cy="-3.4" transform="rotate(216)"/>
        <ellipse rx="1.8" ry="4.2" cy="-3.4" transform="rotate(288)"/>
      </g>
      <circle r="1.4" fill="#8E5418"/>
    </g>

    <!-- Bud -->
    <g id="bud">
      <ellipse rx="2.4" ry="3.2" fill="#A85F1C"/>
      <circle r="0.9" fill="#3D2812"/>
    </g>

    <!-- Rose CLUSTERS (bouquets of 2-3 roses each) -->
    <g id="cluster-AB">
      <use href="#rose-A" transform="translate(-9, -7)"/>
      <use href="#rose-B" transform="translate(11, 8) scale(0.9) rotate(20)"/>
    </g>
    <g id="cluster-BC">
      <use href="#rose-B" transform="translate(-8, -6)"/>
      <use href="#rose-C" transform="translate(10, 9) scale(0.85) rotate(-15)"/>
    </g>
    <g id="cluster-AC">
      <use href="#rose-A" transform="translate(-10, 6)"/>
      <use href="#rose-C" transform="translate(9, -8) scale(0.85) rotate(25)"/>
    </g>
    <!-- Triple cluster -->
    <g id="cluster-3">
      <use href="#rose-A" transform="translate(-12, -8)"/>
      <use href="#rose-B" transform="translate(10, 6) scale(0.9) rotate(15)"/>
      <use href="#rose-C" transform="translate(-2, 14) scale(0.75) rotate(-30)"/>
    </g>
  </defs>

  <!-- ===== LAYER 1: dense leaf canopy (about 50 leaves) ===== -->
  <g>
    <!-- Top-left bouquet area — heavy leaf cover -->
    <use href="#leaf-L" transform="translate(20,28) rotate(-30)"/>
    <use href="#leaf-L" transform="translate(82,32) rotate(35)"/>
    <use href="#leaf-L" transform="translate(38,68) rotate(50)"/>
    <use href="#leaf-M" transform="translate(48,12) rotate(0)"/>
    <use href="#leaf-M" transform="translate(8,58) rotate(75)"/>
    <use href="#leaf-M" transform="translate(92,68) rotate(-50)"/>
    <use href="#leaf-M" transform="translate(68,18) rotate(-15)"/>
    <use href="#leaf-S" transform="translate(56,82) rotate(45)"/>
    <use href="#leaf-S" transform="translate(28,82) rotate(20)"/>
    <use href="#leaf-S" transform="translate(78,76) rotate(80)"/>
    <use href="#leaf-XS" transform="translate(14,38) rotate(-45)"/>
    <use href="#leaf-XS" transform="translate(94,12) rotate(60)"/>

    <!-- Top-right bouquet area -->
    <use href="#leaf-L" transform="translate(140,30) rotate(40)"/>
    <use href="#leaf-L" transform="translate(206,52) rotate(-20)"/>
    <use href="#leaf-L" transform="translate(168,84) rotate(60)"/>
    <use href="#leaf-M" transform="translate(170,22) rotate(70)"/>
    <use href="#leaf-M" transform="translate(218,98) rotate(45)"/>
    <use href="#leaf-M" transform="translate(132,68) rotate(-40)"/>
    <use href="#leaf-M" transform="translate(192,28) rotate(20)"/>
    <use href="#leaf-S" transform="translate(150,92) rotate(-60)"/>
    <use href="#leaf-S" transform="translate(196,108) rotate(30)"/>
    <use href="#leaf-S" transform="translate(228,72) rotate(-15)"/>
    <use href="#leaf-XS" transform="translate(124,42) rotate(50)"/>

    <!-- Middle band — connecting bouquets, dense -->
    <use href="#leaf-L" transform="translate(108,108) rotate(30)"/>
    <use href="#leaf-M" transform="translate(118,82) rotate(-20)"/>
    <use href="#leaf-M" transform="translate(110,128) rotate(60)"/>
    <use href="#leaf-M" transform="translate(78,108) rotate(40)"/>
    <use href="#leaf-M" transform="translate(140,118) rotate(-50)"/>
    <use href="#leaf-S" transform="translate(58,142) rotate(-30)"/>
    <use href="#leaf-S" transform="translate(170,144) rotate(20)"/>
    <use href="#leaf-S" transform="translate(220,118) rotate(-40)"/>
    <use href="#leaf-S" transform="translate(20,118) rotate(60)"/>
    <use href="#leaf-XS" transform="translate(94,142) rotate(15)"/>

    <!-- Bottom-left bouquet area -->
    <use href="#leaf-L" transform="translate(18,134) rotate(20)"/>
    <use href="#leaf-L" transform="translate(82,162) rotate(-40)"/>
    <use href="#leaf-L" transform="translate(38,196) rotate(60)"/>
    <use href="#leaf-M" transform="translate(48,194) rotate(80)"/>
    <use href="#leaf-M" transform="translate(20,176) rotate(45)"/>
    <use href="#leaf-M" transform="translate(72,184) rotate(-20)"/>
    <use href="#leaf-S" transform="translate(96,200) rotate(-20)"/>
    <use href="#leaf-S" transform="translate(8,160) rotate(-60)"/>
    <use href="#leaf-XS" transform="translate(58,222) rotate(40)"/>

    <!-- Bottom-right bouquet area -->
    <use href="#leaf-L" transform="translate(154,156) rotate(-25)"/>
    <use href="#leaf-L" transform="translate(214,178) rotate(40)"/>
    <use href="#leaf-L" transform="translate(178,212) rotate(-50)"/>
    <use href="#leaf-M" transform="translate(190,210) rotate(-15)"/>
    <use href="#leaf-M" transform="translate(170,134) rotate(70)"/>
    <use href="#leaf-M" transform="translate(218,148) rotate(20)"/>
    <use href="#leaf-S" transform="translate(228,144) rotate(20)"/>
    <use href="#leaf-S" transform="translate(140,184) rotate(-30)"/>
    <use href="#leaf-XS" transform="translate(160,228) rotate(-40)"/>

    <!-- Bottom-center cluster leaves -->
    <use href="#leaf-M" transform="translate(132,222) rotate(50)"/>
    <use href="#leaf-S" transform="translate(108,222) rotate(-15)"/>
    <use href="#leaf-XS" transform="translate(82,232) rotate(35)"/>

    <!-- Mirrored edge leaves for tile continuity -->
    <use href="#leaf-M" transform="translate(0,40) rotate(-60)"/>
    <use href="#leaf-M" transform="translate(240,40) rotate(-60)"/>
    <use href="#leaf-M" transform="translate(0,160) rotate(40)"/>
    <use href="#leaf-M" transform="translate(240,160) rotate(40)"/>
    <use href="#leaf-S" transform="translate(120,0) rotate(-30)"/>
    <use href="#leaf-S" transform="translate(120,240) rotate(-30)"/>
    <use href="#leaf-XS" transform="translate(0,100) rotate(70)"/>
    <use href="#leaf-XS" transform="translate(240,100) rotate(70)"/>
  </g>


    <!-- Extra density leaves to fill cream gaps -->
    <use href="#leaf-S" transform="translate(116,180) rotate(70)"/>
    <use href="#leaf-S" transform="translate(120,60) rotate(-25)"/>
    <use href="#leaf-S" transform="translate(45,108) rotate(45)"/>
    <use href="#leaf-S" transform="translate(195,108) rotate(-45)"/>
    <use href="#leaf-XS" transform="translate(65,158) rotate(80)"/>
    <use href="#leaf-XS" transform="translate(175,158) rotate(-40)"/>
    <use href="#leaf-XS" transform="translate(15,90) rotate(30)"/>
    <use href="#leaf-XS" transform="translate(225,90) rotate(-50)"/>
    <use href="#leaf-XS" transform="translate(108,148) rotate(15)"/>
    <use href="#leaf-XS" transform="translate(132,160) rotate(-30)"/>
    <use href="#leaf-XS" transform="translate(70,200) rotate(60)"/>
    <use href="#leaf-XS" transform="translate(170,200) rotate(-20)"/>
    <use href="#leaf-XS" transform="translate(100,72) rotate(45)"/>
    <use href="#leaf-XS" transform="translate(140,80) rotate(-60)"/>
    <use href="#leaf-S" transform="translate(80,42) rotate(100)"/>
    <use href="#leaf-S" transform="translate(160,42) rotate(-100)"/>

  <!-- ===== LAYER 2: daisies and buds — about 25 small accents ===== -->
  <g>
    <use href="#daisy-s" transform="translate(110,16) rotate(15)"/>
    <use href="#daisy-s" transform="translate(220,12) rotate(45)"/>
    <use href="#daisy-s" transform="translate(102,102) rotate(-30) scale(1.1)"/>
    <use href="#daisy-s" transform="translate(228,128) rotate(-20)"/>
    <use href="#daisy-s" transform="translate(96,178) rotate(60)"/>
    <use href="#daisy-s" transform="translate(12,108) rotate(20)"/>
    <use href="#daisy-s" transform="translate(140,140) rotate(-50)"/>
    <use href="#daisy-s" transform="translate(70,116) rotate(80)"/>
    <use href="#daisy-s" transform="translate(206,224) rotate(-10)"/>
    <use href="#daisy-s" transform="translate(38,228) rotate(30)"/>
    <use href="#daisy-s" transform="translate(180,84) rotate(15)"/>
    <use href="#daisy-s" transform="translate(64,46) rotate(-30)"/>
    <use href="#daisy-s" transform="translate(160,116) rotate(50)"/>
    <use href="#daisy-s" transform="translate(28,162) rotate(-20)"/>
    <use href="#daisy-s" transform="translate(208,158) rotate(40)"/>

    <use href="#bud" transform="translate(146,28) rotate(20)"/>
    <use href="#bud" transform="translate(82,128) rotate(-30)"/>
    <use href="#bud" transform="translate(218,184) rotate(60)"/>
    <use href="#bud" transform="translate(36,182) rotate(-15)"/>
    <use href="#bud" transform="translate(178,108) rotate(45)"/>
    <use href="#bud" transform="translate(128,194) rotate(-30)"/>
    <use href="#bud" transform="translate(60,68) rotate(50)"/>
    <use href="#bud" transform="translate(192,140) rotate(-20)"/>
    <use href="#bud" transform="translate(8,200) rotate(15)"/>
    <use href="#bud" transform="translate(138,52) rotate(-40)"/>
  </g>

  <!-- ===== LAYER 3: rose CLUSTERS — 9 interior + 8 edge/corner ===== -->
  <g>
    <!-- Corners (same cluster + rotation, tiles into one continuous bouquet) -->
    <use href="#cluster-AB" transform="translate(0,0) rotate(15)"/>
    <use href="#cluster-AB" transform="translate(240,0) rotate(15)"/>
    <use href="#cluster-AB" transform="translate(0,240) rotate(15)"/>
    <use href="#cluster-AB" transform="translate(240,240) rotate(15)"/>

    <!-- Edge mid clusters (paired across tile boundaries) -->
    <use href="#cluster-BC" transform="translate(120,0) rotate(20)"/>
    <use href="#cluster-BC" transform="translate(120,240) rotate(20)"/>
    <use href="#cluster-AC" transform="translate(0,120) rotate(35)"/>
    <use href="#cluster-AC" transform="translate(240,120) rotate(35)"/>

    <!-- Interior — 4 main double-clusters -->
    <use href="#cluster-3" transform="translate(56,52) rotate(-10)"/>
    <use href="#cluster-3" transform="translate(180,68) rotate(20)"/>
    <use href="#cluster-3" transform="translate(54,162) rotate(35)"/>
    <use href="#cluster-3" transform="translate(180,170) rotate(-25)"/>

    <!-- Filler interior clusters for density -->
    <use href="#cluster-AB" transform="translate(118,118) rotate(45) scale(0.85)"/>
    <use href="#cluster-BC" transform="translate(118,210) rotate(15) scale(0.8)"/>
    <use href="#cluster-AC" transform="translate(118,32) rotate(-15) scale(0.8)"/>
  </g>

</svg>
