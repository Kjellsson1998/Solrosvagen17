<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <title>Domek — Sol</title>
  <desc>Tileable mod-sunburst pattern, inspired by the green textured wallpaper with radial circles. 200×200 tile, 4 cells.</desc>

  <!-- Background -->
  <rect width="200" height="200" fill="#3B4A26"/>

  <!-- Subtle base texture: dotted speckle -->
  <g fill="#2C381C" opacity="0.55">
    <circle cx="14" cy="22" r="1"/>
    <circle cx="38" cy="9" r="0.8"/>
    <circle cx="71" cy="32" r="1.1"/>
    <circle cx="92" cy="14" r="0.9"/>
    <circle cx="120" cy="45" r="1"/>
    <circle cx="155" cy="11" r="0.8"/>
    <circle cx="184" cy="36" r="1.1"/>
    <circle cx="22" cy="68" r="0.9"/>
    <circle cx="56" cy="88" r="1"/>
    <circle cx="142" cy="78" r="0.8"/>
    <circle cx="168" cy="92" r="1.1"/>
    <circle cx="8" cy="118" r="0.9"/>
    <circle cx="46" cy="138" r="1"/>
    <circle cx="84" cy="155" r="1.1"/>
    <circle cx="118" cy="142" r="0.8"/>
    <circle cx="160" cy="155" r="1"/>
    <circle cx="190" cy="178" r="0.9"/>
    <circle cx="32" cy="186" r="1"/>
    <circle cx="74" cy="178" r="0.8"/>
    <circle cx="106" cy="188" r="1.1"/>
  </g>

  <!-- Cell grid lines (very subtle) -->
  <g stroke="#2C381C" stroke-width="0.8" opacity="0.5">
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
  </g>

  <!-- ============= Cell 1: top-left, big sunburst (32 rays) ============= -->
  <g transform="translate(50,50)">
    <!-- Outer faint halo -->
    <circle r="44" fill="none" stroke="#627944" stroke-width="0.6" opacity="0.6"/>
    <!-- Sunburst rays via dashed thick stroke -->
    <circle r="26" fill="none" stroke="#D6AC2D" stroke-width="34"
            pathLength="32" stroke-dasharray="0.42 0.58"/>
    <!-- Inner mid ring -->
    <circle r="9" fill="#627944"/>
    <!-- Small center -->
    <circle r="3.5" fill="#D6AC2D"/>
  </g>

  <!-- ============= Cell 2: top-right, solid disk with small rays ============= -->
  <g transform="translate(150,50)">
    <!-- Solid mossy circle -->
    <circle r="32" fill="#4D6033"/>
    <!-- Edge sunburst (16 short rays, gold) -->
    <circle r="29" fill="none" stroke="#B68F18" stroke-width="6"
            pathLength="16" stroke-dasharray="0.42 0.58"/>
    <!-- Inner solid -->
    <circle r="22" fill="#3B4A26"/>
    <!-- Center dot -->
    <circle r="2.5" fill="#D6AC2D"/>
  </g>

  <!-- ============= Cell 3: bottom-left, medium sunburst (24 rays) ============= -->
  <g transform="translate(50,150)">
    <!-- Sunburst -->
    <circle r="22" fill="none" stroke="#B68F18" stroke-width="26"
            pathLength="24" stroke-dasharray="0.4 0.6"/>
    <!-- Inner -->
    <circle r="8" fill="#2C381C"/>
    <circle r="8" fill="none" stroke="#627944" stroke-width="0.8"/>
    <circle r="2" fill="#D6AC2D"/>
  </g>

  <!-- ============= Cell 4: bottom-right, double-ring sunburst ============= -->
  <g transform="translate(150,150)">
    <!-- Outer ring of long rays (12) -->
    <circle r="35" fill="none" stroke="#627944" stroke-width="14"
            pathLength="12" stroke-dasharray="0.18 0.82" opacity="0.85"/>
    <!-- Inner solid -->
    <circle r="22" fill="#4D6033"/>
    <!-- Inner ring of short rays (24) -->
    <circle r="17" fill="none" stroke="#D6AC2D" stroke-width="9"
            pathLength="24" stroke-dasharray="0.42 0.58"/>
    <!-- Hub -->
    <circle r="9" fill="#3B4A26"/>
    <circle r="2.5" fill="#D6AC2D"/>
  </g>

</svg>
