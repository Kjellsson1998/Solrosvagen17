<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <title>Domek — Solros</title>
  <desc>Tileable 70s flower-power pattern, inspired by the chocolate-background daisy wallpaper. 160×160 tile.</desc>

  <!-- Background -->
  <rect width="160" height="160" fill="#322C1F"/>

  <!-- Reusable daisy definitions -->
  <defs>
    <!-- Orange daisy -->
    <g id="daisy-o">
      <g fill="#DC6F50">
        <ellipse rx="2.2" ry="6" cy="-5"/>
        <ellipse rx="2.2" ry="6" cy="-5" transform="rotate(60)"/>
        <ellipse rx="2.2" ry="6" cy="-5" transform="rotate(120)"/>
        <ellipse rx="2.2" ry="6" cy="-5" transform="rotate(180)"/>
        <ellipse rx="2.2" ry="6" cy="-5" transform="rotate(240)"/>
        <ellipse rx="2.2" ry="6" cy="-5" transform="rotate(300)"/>
      </g>
      <circle r="2.4" fill="#553F08"/>
    </g>
    <!-- Yellow daisy -->
    <g id="daisy-y">
      <g fill="#E6C656">
        <ellipse rx="2" ry="5.4" cy="-4.5"/>
        <ellipse rx="2" ry="5.4" cy="-4.5" transform="rotate(60)"/>
        <ellipse rx="2" ry="5.4" cy="-4.5" transform="rotate(120)"/>
        <ellipse rx="2" ry="5.4" cy="-4.5" transform="rotate(180)"/>
        <ellipse rx="2" ry="5.4" cy="-4.5" transform="rotate(240)"/>
        <ellipse rx="2" ry="5.4" cy="-4.5" transform="rotate(300)"/>
      </g>
      <circle r="2" fill="#553F08"/>
    </g>
    <!-- White daisy (cream) -->
    <g id="daisy-w">
      <g fill="#F5EFE3">
        <ellipse rx="1.6" ry="4.4" cy="-3.6"/>
        <ellipse rx="1.6" ry="4.4" cy="-3.6" transform="rotate(72)"/>
        <ellipse rx="1.6" ry="4.4" cy="-3.6" transform="rotate(144)"/>
        <ellipse rx="1.6" ry="4.4" cy="-3.6" transform="rotate(216)"/>
        <ellipse rx="1.6" ry="4.4" cy="-3.6" transform="rotate(288)"/>
      </g>
      <circle r="1.4" fill="#D6AC2D"/>
    </g>
    <!-- Small bud -->
    <g id="bud">
      <ellipse rx="2.6" ry="3.4" fill="#A93F22"/>
      <circle r="1" fill="#553F08"/>
    </g>
    <!-- Leaf -->
    <g id="leaf">
      <path d="M 0,-5 C 3,-3 3,3 0,5 C -3,3 -3,-3 0,-5 Z" fill="#4D6033"/>
    </g>
  </defs>

  <!-- ============= Leaves layer (background) ============= -->
  <g opacity="0.85">
    <use href="#leaf" transform="translate(28,42) rotate(20)"/>
    <use href="#leaf" transform="translate(72,28) rotate(-30) scale(1.1)"/>
    <use href="#leaf" transform="translate(112,52) rotate(45)"/>
    <use href="#leaf" transform="translate(140,90) rotate(80)"/>
    <use href="#leaf" transform="translate(48,98) rotate(-60)"/>
    <use href="#leaf" transform="translate(98,118) rotate(110) scale(0.9)"/>
    <use href="#leaf" transform="translate(20,130) rotate(30)"/>
    <use href="#leaf" transform="translate(135,140) rotate(-15)"/>
  </g>

  <!-- ============= Flowers layer ============= -->
  <!-- Interior flowers (fully within tile) -->
  <use href="#daisy-o" transform="translate(36,32) rotate(15)"/>
  <use href="#daisy-y" transform="translate(82,42) rotate(-25)"/>
  <use href="#daisy-w" transform="translate(126,30) rotate(8)"/>

  <use href="#daisy-y" transform="translate(22,82) rotate(40)"/>
  <use href="#daisy-o" transform="translate(64,76) rotate(-10) scale(1.08)"/>
  <use href="#daisy-w" transform="translate(108,90) rotate(60)"/>
  <use href="#daisy-o" transform="translate(140,72) rotate(20) scale(0.9)"/>

  <use href="#daisy-w" transform="translate(40,124) rotate(-20)"/>
  <use href="#daisy-y" transform="translate(80,138) rotate(45) scale(0.95)"/>
  <use href="#daisy-o" transform="translate(120,128) rotate(-40)"/>

  <!-- Small buds for filler -->
  <use href="#bud" transform="translate(54,58) rotate(30)"/>
  <use href="#bud" transform="translate(102,62) rotate(-15)"/>
  <use href="#bud" transform="translate(28,108) rotate(45)"/>
  <use href="#bud" transform="translate(86,108) rotate(-30)"/>
  <use href="#bud" transform="translate(150,108) rotate(20)"/>
  <use href="#bud" transform="translate(60,18) rotate(-40)"/>

  <!-- ============= Edge-crossing flowers (for tile continuity) ============= -->
  <!-- Top edge -->
  <use href="#daisy-o" transform="translate(0,12) rotate(25)"/>
  <use href="#daisy-y" transform="translate(160,8) rotate(-15)"/>
  <!-- Bottom edge -->
  <use href="#daisy-w" transform="translate(160,160) rotate(30)"/>
  <use href="#daisy-y" transform="translate(0,160) rotate(-10)"/>
  <!-- Sides crossings -->
  <use href="#daisy-o" transform="translate(0,68) rotate(-10) scale(0.95)"/>
  <use href="#daisy-w" transform="translate(160,138) rotate(50)"/>

</svg>
